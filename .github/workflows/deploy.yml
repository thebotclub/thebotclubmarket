name: Deploy to GCP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: thebotclub
  GCP_REGION: australia-southeast1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/thebotclub
  CLOUD_RUN_SERVICE: thebotclub-production

jobs:
  build-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
      - run: |
          IMAGE="${{ env.GAR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE -t "${{ env.GAR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest" .
          docker push $IMAGE
          docker push "${{ env.GAR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

  deploy:
    name: 🚀 Deploy to Cloud Run
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image "${{ env.GAR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "NODE_ENV=production" \
            --set-secrets "DATABASE_URL=thebotclub-database-url:latest,NEXTAUTH_SECRET=thebotclub-nextauth-secret:latest,STRIPE_SECRET_KEY=thebotclub-stripe-secret:latest"
      - run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$URL/api/health" || true)
            [ "$STATUS" = "200" ] && echo "✅ Health check passed" && exit 0
            sleep 5
          done
          echo "❌ Health check failed" && exit 1
